name: OTC Node Demo

on:
  workflow_dispatch:
  # Uncomment to run on schedule (UTC)
  # schedule:
  #   - cron: "*/30 * * * *"

jobs:
  otc-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: node-otc-demo
        run: npm install

      - name: Run OTC demo worker
        working-directory: node-otc-demo
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          TICKER_COL: ${{ secrets.TICKER_COL }}
          DATA_START_ROW: ${{ secrets.DATA_START_ROW }}
          MAX_TICKERS: ${{ secrets.MAX_TICKERS }}
          CONCURRENCY: ${{ secrets.CONCURRENCY }}
          REQUEST_TIMEOUT_MS: ${{ secrets.REQUEST_TIMEOUT_MS }}
          RETRY_COUNT: ${{ secrets.RETRY_COUNT }}
          OTC_SKIP_TICKERS: ${{ secrets.OTC_SKIP_TICKERS }}
        run: npm run run:otc

